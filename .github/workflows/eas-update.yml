name: 🚀 EAS Update (OTA)

# Se ejecuta cada vez que se hace push a main
# → sube el bundle a Expo Go automáticamente, sin necesidad de ir a Codespaces
on:
  push:
    branches:
      - main

jobs:
  update:
    name: Publish EAS Update
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish OTA update to Expo Go
        run: |
          CI=1 npx eas-cli update \
            --branch main \
            --message "${{ github.event.head_commit.message }}" \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
